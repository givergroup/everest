<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // 1. ดึงเส้นทาง URL ทั้งหมดออกมาและลบสแลชหัวท้ายออก
        var fullPath = window.location.pathname.replace(/^\/+|\/+$/g, '');
        
        // เคลียร์ซับโฟลเดอร์ของ GitHub (ถ้ามี)
        if (fullPath.startsWith('everest/')) {
            fullPath = fullPath.replace('everest/', '');
        }

        // 2. ตรวจสอบว่าเป็นเวอร์ชันภาษาอังกฤษหรือไม่
        var isEnglish = false;
        var memberName = fullPath;

        if (fullPath.startsWith('en/')) {
            isEnglish = true;
            memberName = fullPath.replace('en/', ''); // ตัดคำว่า en/ ออกเพื่อให้เหลือแค่ชื่อสมาชิกเพียวๆ เช่น coachpetch
        }

        // 3. ตรวจสอบความถูกต้องและดึงข้อมูลสมาชิก
        if (memberName && !memberName.includes('.')) {
            fetch('/everest/data/members.json')
                .then(function(response) { 
                    if (!response.ok) {
                        return fetch('/data/members.json').then(function(res) { return res.json(); });
                    }
                    return response.json(); 
                })
                .then(function(members) {
                    
                    // 4. ตรวจสอบว่ามีชื่อสมาชิกคนนี้อยู่ในไฟล์ members.json หรือไม่
                    if (members && members[memberName] !== undefined) {
                        
                        // ถ้าระบบตรวจพบว่าเป็นลิงก์ฝั่งอังกฤษ (/en/) ให้ดีดไปเวอร์ชันภาษาอังกฤษ
                        if (isEnglish) {
                            window.location.href = "https://everest191.com/en/?ref=" + memberName;
                        } else {
                            // ถ้าไม่ใช่ ให้เด้งไปเวอร์ชันปกติ (ภาษาไทย)
                            window.location.href = "https://everest191.com/?ref=" + memberName;
                        }
                        
                    } else {
                        // ถ้าไม่พบชื่อสมาชิก ให้ส่งกลับหน้าแรกของเวอร์ชันนั้นๆ
                        window.location.href = isEnglish ? "https://everest191.com/en/" : "https://everest191.com/";
                    }
                })
                .catch(function(err) {
                    window.location.href = isEnglish ? "https://everest191.com/en/" : "https://everest191.com/";
                });
        } else {
            window.location.href = isEnglish ? "https://everest191.com/en/" : "https://everest191.com/";
        }
    </script>
</head>
<body>
    <p>กำลังนำคุณไปสู่หน้าผู้แนะนำ... / Redirecting to referrer page...</p>
</body>
</html>
