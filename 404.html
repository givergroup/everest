<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // 1. ดึงชื่อสมาชิกออกจาก URL (เช่น /coachwin -> coachwin)
        var path = window.location.pathname.replace(/^\/+|\/+$/g, '');
        
        // แยกเคสเผื่อเว็บอยู่ในซับโฟลเดอร์ everest
        if (path.startsWith('everest/')) {
            path = path.replace('everest/', '');
        }

        if (path && !path.includes('.')) {
            // 2. ยิงพาธไปที่โฟลเดอร์ data/members.json ให้ถูกต้องตามโครงสร้าง GitHub ของคุณ
            fetch('/everest/data/members.json')
                .then(function(response) { 
                    if (!response.ok) {
                        // ป้องกันเผื่อพาธหลักบนเว็บจริงไม่มีคำว่า /everest/
                        return fetch('/data/members.json').then(function(res) { return res.json(); });
                    }
                    return response.json(); 
                })
                .then(function(members) {
                    
                    // 3. ตรวจสอบว่ามีชื่อสมาชิกคนนี้ (เช่น coachwin หรือ coachpaul) อยู่ใน Object หรือไม่
                    if (members && members[path] !== undefined) {
                        // ถ้าเจอสมาชิกในระบบ ให้เด้งไปที่ลิงก์ที่ถูกต้องทันที!
                        window.location.href = "https://everest191.com/?ref=" + path;
                    } else {
                        // ถ้าหาไม่เจอ ให้ส่งกลับหน้าแรก
                        window.location.href = "https://everest191.com/";
                    }
                })
                .catch(function(err) {
                    // หากเกิดข้อผิดพลาดใดๆ ให้ส่งกลับหน้าแรกป้องกันหน้าขาวค้าง
                    window.location.href = "https://everest191.com/";
                });
        } else {
            window.location.href = "https://everest191.com/";
        }
    </script>
</head>
<body>
    <p>กำลังนำคุณไปสู่หน้าผู้แนะนำ...</p>
</body>
</html>
