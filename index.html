<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Everest | ดิจิทัลแพลตฟอร์มสุดหรูเพื่อยุคใหม่</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;700;800;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* โทนสีพรีเมียม: เขียวมรกตและทองอร่าม */
    :root {
      --dark-bg: #013736;
      --dark-bg-alt: #002820;
      --gold: #b48600;
      --gold-dark: #927000;
      --accent: #065d4f;
      --white: #f5f5f5;
      --muted: #829e94;
      --card-bg: rgba(1, 35, 34, 0.85);
      --border: rgba(255, 255, 255, 0.08);
      --radius: 22px;
      --shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Prompt", "Inter", sans-serif;
      background: linear-gradient(180deg, var(--dark-bg), var(--dark-bg-alt));
      color: var(--white);
      line-height: 1.7;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }

    /* ส่วนหัวและเมนู */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(2, 12, 32, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    /* กล่องรูปผู้แนะนำในแถบเมนู */
    .nav-profile-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    /* fallback ถ้าไม่มีรูป */
    #navAvatarFallback {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--dark-bg-alt);
      border: 2px solid var(--gold);
      color: var(--gold);
      font-weight: 800;
      font-size: 0.9rem;
      display: none;
      justify-content: center;
      align-items: center;
      text-transform: uppercase;
    }
    /* รูปผู้แนะนำ */
    #navSponsorImage {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      object-fit: cover;
      display: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .nav .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 1.3rem;
    }
    .nav .logo img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }
    .nav .links {
      display: flex;
      gap: 20px;
      font-size: 0.9rem;
    }
    .nav .links a {
      opacity: 0.85;
      transition: opacity 0.2s ease;
    }
    .nav .links a:hover {
      opacity: 1;
      color: var(--gold);
    }
    .nav .cta {
      padding: 8px 18px;
      border-radius: 999px;
      background: linear-gradient(45deg, var(--gold), var(--gold-dark));
      color: var(--dark-bg);
      font-weight: 800;
      font-size: 0.9rem;
      box-shadow: 0 6px 18px rgba(180, 134, 0, 0.3);
      white-space: nowrap;
    }
    /* … (สไตล์ส่วนอื่นคงเดิม) … */
  </style>
</head>
<body>
  <!-- ข้อความวิ่ง -->
  <div class="marquee">
    <div>🚀 ยินดีต้อนรับสู่ Project Everest … (ข้อความวิ่ง) … 🚀</div>
  </div>

  <!-- ส่วนหัว -->
  <header>
    <div class="nav">
      <!-- รูปโปรไฟล์ผู้แนะนำ -->
      <div class="nav-profile-wrap">
        <div id="navAvatarFallback"></div>
        <img id="navSponsorImage" src="" alt="ผู้แนะนำ" />
      </div>
      <a href="#" class="logo">
        <img src="https://raw.githubusercontent.com/givergroup/everest/refs/heads/main/en/images/projecteverest-thai.png" alt="Project Everest Logo">
        Project Everest
      </a>
      <div class="links">
        <a href="#about">เกี่ยวกับ</a>
        <a href="#academy">คอร์สเรียน</a>
        <a href="#business">โมเดลธุรกิจ</a>
        <a href="#sponsor">ผู้แนะนำ</a>
        <!-- ปุ่มสลับภาษาอังกฤษด้านบน -->
        <a id="enLink" href="#" rel="noopener">ENGLISH</a>
      </div>
      <a id="navRegister" class="cta" href="#" target="_blank" rel="noopener">สมัคร</a>
    </div>
  </header>

  <!-- HERO, About, Academy, Business, Sponsor ส่วนอื่น ๆ คงเดิมตามที่คุณใช้ -->

  <!-- ส่วนท้าย -->
  <footer>
    <strong>EVEREST ACADEMY</strong><br/>
    หนึ่งแพลตฟอร์มสำหรับการเรียนรู้ สร้างตัวตน และโอกาสทางธุรกิจยุคใหม่
    <!-- ปุ่มสลับภาษาอังกฤษในส่วนท้าย -->
    <div class="language-switch" style="margin-top:12px;">
      <a id="footerEnLink" href="#" rel="noopener" style="color:var(--gold);font-weight:800;text-decoration:underline;">ENGLISH</a>
    </div>
  </footer>

  <!-- ปุ่มลอยบนมือถือ -->
  <div class="floating-cta">
    <a id="floatLine" class="btn-line" href="#" target="_blank" rel="noopener">LINE</a>
    <a id="floatRegister" class="btn-register" href="#" target="_blank" rel="noopener">สมัคร</a>
  </div>

  <!-- สคริปต์ตั้งค่าข้อมูลผู้แนะนำและลิงก์ -->
  <script>
    const DEFAULT_REF = "coachpaul";
    const MEMBERS_JSON_PATH = "./data/members.json";

    function getReferralCode() {
      const params = new URLSearchParams(window.location.search);
      return (params.get("ref") || DEFAULT_REF).trim().toLowerCase();
    }

    function safeText(value, fallback = "") {
      return value && String(value).trim() ? String(value).trim() : fallback;
    }

    function whatsappLink(rawPhone) {
      const phone = safeText(rawPhone).replace(/[^\d+]/g, "");
      if (!phone || phone.toLowerCase().includes("line")) return "#";
      return "https://wa.me/" + phone.replace("+", "");
    }

    function setLink(id, url) {
      const el = document.getElementById(id);
      if (!el) return;
      if (!url || url === "#") {
        el.style.display = "none";
        el.href = "#";
        return;
      }
      el.style.display = "inline-flex";
      el.href = url;
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }

    function setProfileImage(imgId, fallbackId, src, name) {
      const img = document.getElementById(imgId);
      const fallback = document.getElementById(fallbackId);
      if (!img || !fallback) return;
      const firstLetter = safeText(name, "E").charAt(0).toUpperCase();
      fallback.textContent = firstLetter;

      if (!src) {
        img.style.display = "none";
        fallback.style.display = "grid";
        return;
      }
      img.src = src;
      img.alt = "รูปโปรไฟล์ของ " + safeText(name, "ผู้แนะนำ");
      img.onload = () => {
        img.style.display = "block";
        fallback.style.display = "none";
      };
      img.onerror = () => {
        img.style.display = "none";
        fallback.style.display = "grid";
      };
    }

    function updateSponsor(member, refCode) {
      const nameTh = safeText(member.name_th, "Project Everest");
      const nameEn = safeText(member.name_en, "Sponsor");
      const lineUrl = safeText(member.line_url, "#");
      const registerLink = safeText(member.register_link, "#");
      const imageUrl = safeText(member.image_url, "");
      const phone = safeText(member.WhatsApp || member.whatsapp || member.phone, "");
      const whatsApp = whatsappLink(phone);

      setText("sponsorNameTh", nameTh);
      setText("sponsorNameEn", nameEn);
      setProfileImage("sponsorImage", "avatarFallback", imageUrl, nameTh);

      ["heroLine","sponsorLine","floatLine"].forEach(id => setLink(id, lineUrl));
      ["heroRegister","sponsorRegister","floatRegister","navRegister"].forEach(id => setLink(id, registerLink));
      ["sponsorWhatsApp"].forEach(id => setLink(id, whatsApp));

      // อัปเดตลิงก์สลับภาษาอังกฤษด้านบน
      const enLink = document.getElementById("enLink");
      if (enLink) {
        const host = "https://everest191.pages.dev";
        enLink.href = host + "/en/index.html?ref=" + encodeURIComponent(refCode);
      }

      // อัปเดตลิงก์สลับภาษาอังกฤษด้านล่าง
      const footerEn = document.getElementById("footerEnLink");
      if (footerEn) {
        const host = "https://everest191.pages.dev";
        footerEn.href = host + "/en/index.html?ref=" + encodeURIComponent(refCode);
      }

      // อัปเดตรูปผู้แนะนำในแถบเมนู
      setProfileImage("navSponsorImage", "navAvatarFallback", imageUrl, nameTh);
    }

    async function loadMemberData() {
      const refCode = getReferralCode();
      try {
        const response = await fetch(MEMBERS_JSON_PATH, { cache: "no-store" });
        if (!response.ok) throw new Error("Cannot load members.json");
        const members = await response.json();
        const member = members[refCode] || members[DEFAULT_REF] || Object.values(members)[0];
        if (!member) throw new Error("No member found");
        updateSponsor(member, refCode);
      } catch (error) {
        console.error(error);
        updateSponsor({
          name_th: "Project Everest",
          name_en: "Everest Platform",
          line_url: "#",
          register_link: "#",
          image_url: ""
        }, DEFAULT_REF);
      }
    }
    loadMemberData();
  </script>
</body>
</html>
