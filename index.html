<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Everest | ดิจิทัลแพลตฟอร์มสุดหรูเพื่อยุคใหม่</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;700;800;900&family=Inter:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    /* กำหนดโทนสีหลักใหม่ */
    :root {
      --dark-bg: #013736;        /* เขียวเข้มมรกต (พื้นหลังหลัก) */
      --dark-bg-alt: #002820;    /* เขียวเข้มมรกตเข้ม (พื้นหลังรอง) */
      --gold: #b48600;           /* เหลืองทองอร่ามเข้ม (ปุ่มและไฮไลต์) */
      --gold-dark: #927000;      /* เหลืองทองเข้มพิเศษ (ไล่สีและเงา) */
      --accent: #065d4f;         /* สีเขียวเข้มสำหรับไฮไลต์รอง (Line/WhatsApp) */
      --white: #f5f5f5;
      --muted: #829e94;          /* สีตัวหนังสือรองที่เข้ากับเขียวมรกต */
      --card-bg: rgba(1, 35, 34, 0.85);
      --border: rgba(255, 255, 255, 0.08);
      --radius: 22px;
      --shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Prompt", "Inter", sans-serif;
      background: linear-gradient(180deg, var(--dark-bg), var(--dark-bg-alt));
      color: var(--white);
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ... โค้ด CSS อื่น ๆ ไม่จำเป็นต้องแก้ไข ... */

  </style>
</head>
<body>
  <!-- โครงสร้าง HTML ส่วนอื่นยังคงเหมือนเดิม -->
</body>
</html>
