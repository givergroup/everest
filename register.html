<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนสร้างเว็บไซต์ส่วนตัว - EVEREST 191</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; }
        .form-container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a365d; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="tel"], input[type="url"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input:focus { border-color: #3182ce; outline: none; }
        .note { font-size: 11px; color: #718096; margin-top: 4px; }
        button { width: 100%; padding: 12px; background-color: #3182ce; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        button:hover { background-color: #2b6cb0; }
        button:disabled { background-color: #cbd5e0; cursor: not-allowed; }
        .success { background-color: #c6f6d5; color: #22543d; padding: 15px; border-radius: 4px; margin-top: 20px; border: 1px solid #38a169; display: none; text-align: center; font-weight: bold; }
        .error { background-color: #fed7d7; color: #742a2a; padding: 15px; border-radius: 4px; margin-top: 20px; border: 1px solid #e53e3e; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>EVEREST 191<br><span style="font-size: 16px; color:#4a5568;">ลงทะเบียนสร้างเว็บไซต์ส่วนตัว</span></h2>
    
    <form id="regForm">
        <div class="form-group">
            <label for="username">Username (ภาษาอังกฤษตัวพิมพ์เล็ก/ตัวเลขเท่านั้น)</label>
            <input type="text" id="username" placeholder="เช่น paul191" required pattern="^[a-z0-9]+$">
            <div class="note">ใช้สำหรับเป็นลิงก์เว็บของคุณ เช่น everest191.com/?ref=username</div>
        </div>
        
        <div class="form-group">
            <label for="name_th">ชื่อ-นามสกุล (ภาษาไทย)</label>
            <input type="text" id="name_th" placeholder="เช่น โค้ชพล" required>
        </div>
        
        <div class="form-group">
            <label for="name_en">ชื่อ-นามสกุล (ภาษาอังกฤษ)</label>
            <input type="text" id="name_en" placeholder="เช่น Coach Paul" required>
        </div>
        
        <div class="form-group">
            <label for="phone">เบอร์โทรศัพท์มือถือ</label>
            <input type="tel" id="phone" placeholder="เช่น 0952539634" required>
        </div>
        
        <div class="form-group">
            <label for="line_url">ลิงก์ Line QR Code หรือ ลิงก์ไลน์ส่วนตัว</label>
            <input type="url" id="line_url" placeholder="https://line.me/ti/p/..." required>
        </div>
        
        <div class="form-group">
            <label for="register_link">ลิงก์สมัครสมาชิกหลักของคุณ</label>
            <input type="url" id="register_link" placeholder="https://..." required>
        </div>
        
        <button type="submit" id="submitBtn">สร้างเว็บไซต์ส่วนตัวทันที</button>
    </form>

    <div id="msg" class="success"></div>
</div>

<script>
    document.getElementById('regForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const msgDiv = document.getElementById('msg');
        
        submitBtn.disabled = true;
        submitBtn.innerText = 'กำลังประมวลผลระบบระบบ...';
        msgDiv.style.display = 'none';

        try {
            const formData = {
                username: document.getElementById('username').value.trim().toLowerCase(),
                name_th: document.getElementById('name_th').value.trim(),
                name_en: document.getElementById('name_en').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                line_url: document.getElementById('line_url').value.trim(),
                register_link: document.getElementById('register_link').value.trim()
            };

            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            const result = await response.json();

            if (response.ok) {
                msgDiv.className = 'success';
                msgDiv.innerHTML = `🎉 ลงทะเบียนสำเร็จ!<br>เว็บไซต์ของคุณพร้อมใช้งานแล้ว:<br><br><a href="${result.web_url}" target="_blank" style="color: #2b6cb0; word-break: break-all; font-size: 18px;">${result.web_url}</a>`;
                msgDiv.style.display = 'block';
                document.getElementById('regForm').reset();
            } else {
                throw new Error(result.message || 'เกิดข้อผิดพลาดในการลงทะเบียน');
            }
        } catch (error) {
            msgDiv.className = 'error';
            msgDiv.innerText = error.message;
            msgDiv.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'สร้างเว็บไซต์ส่วนตัวทันที';
        }
    });
</script>

</body>
</html>
