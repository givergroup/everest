<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Personal Website - EVEREST 191</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; }
        .form-container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Logo Center Styling */
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 180px; height: auto; }
        
        h2 { text-align: center; color: #1a365d; margin-bottom: 15px; margin-top: 0; font-size: 24px; }
        
        /* Exclusive Team Notice Banner */
        .notice-banner { background-color: #fffaf0; border-left: 4px solid #dd6b20; color: #dd6b20; padding: 12px; border-radius: 4px; font-size: 13px; line-height: 1.5; margin-bottom: 25px; text-align: center; font-weight: 500; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="tel"], input[type="url"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        input:focus { border-color: #3182ce; outline: none; }
        .note { font-size: 12px; color: #718096; margin-top: 2px; }
        button { width: 100%; padding: 12px; background-color: #3182ce; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:hover { background-color: #2b6cb0; }
        #message { margin-top: 20px; padding: 10px; border-radius: 4px; display: none; text-align: center; font-weight: bold; line-height: 1.6; }
        .success { background-color: #c6f6d5; color: #22543d; border: 1px solid #c6f6d5; }
        .error { background-color: #fed7d7; color: #742a2a; border: 1px solid #fed7d7; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="logo-container">
        <img src="/en/images/everest191thai.png" alt="Everest 191 Logo">
    </div>

    <h2>Welcome to Everest 191 Team</h2>
    <div class="notice-banner">
        This registration system is internal and exclusively reserved for members of Coach Pol's team.
    </div>

    <form id="regForm">
        <div class="form-group">
            <label for="username">Username (Lowercase letters and numbers only)</label>
            <input type="text" id="username" placeholder="e.g., coachwin" required pattern="^[a-z0-9]+$">
            <div class="note">No spaces, no special characters. Used for your referral link (?ref=username)</div>
        </div>

        <div class="form-group">
            <label for="name_th">Full Name (Local Language)</label>
            <input type="text" id="name_th" placeholder="e.g., โค้ชวิน" required>
        </div>
        
        <div class="form-group">
            <label for="name_en">Full Name (English)</label>
            <input type="text" id="name_en" placeholder="e.g., Coach Win" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="e.g., 0817346398" required>
        </div>
        
        <div class="form-group">
            <label for="line_url">Personal Line Link or Line OA</label>
            <input type="url" id="line_url" placeholder="https://line.me/ti/p/..." required>
        </div>
        
        <div class="form-group">
            <label for="register_link">Your Main Website Registration Link</label>
            <input type="url" id="register_link" placeholder="https://everest-media.co/register?ref=..." required>
        </div>

        <button type="submit" id="submitBtn">Create My Website Now</button>
    </form>

    <div id="message"></div>
</div>

<script>
    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const msgDiv = document.getElementById('message');
        
        submitBtn.disabled = true;
        submitBtn.innerText = 'Saving Data...';
        msgDiv.style.display = 'none';

        const username = document.getElementById('username').value.trim().toLowerCase();

        try {
            const formData = {
                username: username,
                name_th: document.getElementById('name_th').value.trim(),
                name_en: document.getElementById('name_en').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                line_url: document.getElementById('line_url').value.trim(),
                register_link: document.getElementById('register_link').value.trim(),
                lang: 'en'
            };

            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            const result = await response.json();

            if (response.ok) {
                msgDiv.className = 'success';
                msgDiv.innerHTML = `🎉 Registration Successful!<br>Your personal website is ready to use:<br><br><a href="${result.web_url}" target="_blank" style="color: #2b6cb0; word-break: break-all; font-size: 18px;">${result.web_url}</a>`;
                msgDiv.style.display = 'block';
                document.getElementById('regForm').reset();
            } else {
                throw new Error(result.message || 'Registration failed. Please try again.');
            }
        } catch (error) {
            msgDiv.className = 'error';
            msgDiv.innerText = error.message;
            msgDiv.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Create My Website Now';
        }
    });
</script>

</body>
</html>
